<!DOCTYPE html>
<html>
<head>
  <title>Smart Parking</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
  <h1>Please!<br>Fill The Details:</h1>

  <div class="card">
    <p id="status">Checking parking...</p>
  </div>

  <div class="card">
    <input id="userId" placeholder="Enter Parking Slot To Be Selected  (U001 - U010)">
    
    <select id="duration">
      <option value="30">30 Minutes</option>
      <option value="60">1 Hour</option>
      <option value="120">2 Hours</option>
    </select>

    <button onclick="generateQR()">Generate QR</button>
  </div>

  <div class="card">
    <h3>Your QR Code</h3>
    <img id="qrImage">
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
